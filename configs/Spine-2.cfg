hostname Spine-2
!
interface Loopback0
 ipv4 address 10.0.0.2 255.255.255.255
!
router isis UNDERLAY
 is-type level-2-only
 net 49.0001.0100.0000.0002.00
 address-family ipv4 unicast
  metric-style wide
  segment-routing mpls
 !
 interface Loopback0
  address-family ipv4 unicast
   prefix-sid index 2
!
router bgp 65000
 bgp router-id 10.0.0.2
 address-family l2vpn evpn
 !
 neighbor 10.0.0.11
  remote-as 65000
  update-source Loopback0
  address-family l2vpn evpn
   route-reflector-client
 !
 neighbor 10.0.0.12
  remote-as 65000
  update-source Loopback0
  address-family l2vpn evpn
   route-reflector-client
 !
 neighbor 10.0.0.13
  remote-as 65000
  update-source Loopback0
  address-family l2vpn evpn
   route-reflector-client
 !
 neighbor 10.0.0.14
  remote-as 65000
  update-source Loopback0
  address-family l2vpn evpn
   route-reflector-client